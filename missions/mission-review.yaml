  - id: "02"
    title: "Metrics collector with Goodhart detection"
    description: |
      In /Users/rent/Projects/agentforce, create agentforce/review/collector.py.

      from agentforce.core.state import MissionState, TaskStatus
      from agentforce.review.models import MetricsSnapshot, GoodhartWarning

      class MetricsCollector:

          @staticmethod
          def collect(state: MissionState) -> MetricsSnapshot:
              """Extract all 8 metrics from a MissionState.

              EDGE CASES — all must be handled:
              - 0 total tasks → all rates = 0.0, no division
              - 0 completed tasks → per-task metrics = 0.0
              - All task.tokens_out == 0 → use state.tokens_out/tasks_completed fallback,
                add "per-task token fields are zero; using mission-level fallback" warning
              - Fewer than 2 tasks have review_score > 0 → add data_quality_warning
              - No review events in event_log → review_rejection_rate = 0.0
              - Task missing started_at or completed_at → skip that task in wall time

              METRIC COMPUTATIONS:
              - tasks_completed = count(status == REVIEW_APPROVED)
              - first_pass = count(status == REVIEW_APPROVED AND retries == 0)
              - first_pass_rate = first_pass / total_tasks  (not / tasks_completed)
              - rework_rate = state.total_retries / total_tasks
              - avg_review_score: mean of review_score for tasks where
                  review_score > 0 AND status in {REVIEW_APPROVED, FAILED}
                  (FAILED tasks that received a review before failing count)
              - human_escalation_rate = state.total_human_interventions / total_tasks
              - wall_time: for each task with both started_at and completed_at,
                  parse with datetime.fromisoformat(ts.replace("Z", "+00:00"))
                  sum durations; divide by tasks_completed
              - cost_per_task_usd:
                  task_costs = sum(ts.cost_usd for ts in state.task_states.values())
                  if task_costs > 0: use task_costs / tasks_completed
                  else: use state.cost_usd / tasks_completed (mission-level fallback)
              - token_efficiency:
                  task_tokens = sum(ts.tokens_out for ts in state.task_states.values())
                  if task_tokens > 0: use task_tokens / tasks_completed
                  else: use state.tokens_out / tasks_completed (fallback + warning)
              - review_rejection_rate:
                  approved = count(e for e in state.event_log if e.event_type == "review_approved")
                  rejected = count(e for e in state.event_log if e.event_type == "review_rejected")
                  total = approved + rejected
                  rate = rejected / total if total > 0 else 0.0
              - quality_score = ((avg_review_score/10)*0.4 + first_pass_rate*0.3 +
                                  (1 - human_escalation_rate)*0.3) * 10
              - efficiency_gated = token_efficiency if quality_score >= 7.0 else None
              """

          @staticmethod
          def compute_quality_score(avg_review_score: float, first_pass_rate: float,
                                     human_escalation_rate: float) -> float:
              """Composite quality score on 0-10 scale."""

          @staticmethod
          def gate_efficiency(token_efficiency: float, quality_score: float) -> float | None:
              """Return token_efficiency only if quality_score >= 7.0, else None."""

          @staticmethod
          def detect_goodhart(current: MetricsSnapshot,
                               baseline: MetricsSnapshot) -> list[GoodhartWarning]:
              """Compare current metrics against a baseline. Emit GoodhartWarning when:
              1. token_efficiency improved (decreased) AND quality_score decreased
              2. cost_per_task_usd improved (decreased) AND avg_review_score decreased
              3. first_pass_rate improved (increased) AND human_escalation_rate also increased
              4. wall_time_per_task_s improved (decreased) AND review_rejection_rate increased
              Use a 2% threshold to filter noise: only flag if delta > 2% in each direction.
              """

      Write tests in tests/review/test_collector.py covering:
      - Happy path: realistic 4-task MissionState → verify all 8 metrics correct values
      - Zero tasks: MetricsCollector.collect() on empty mission returns all zeros
      - Zero completed tasks: returns zeros without crashing
      - Missing timestamps: tasks with None started_at/completed_at excluded from wall time
      - Zero token fields on tasks: fallback to mission-level, data_quality_warning present
      - review_rejection_rate: event_log with 3 approved + 1 rejected → 0.25
      - quality_score formula correctness
      - efficiency_gated: None when quality < 7.0, float when quality >= 7.0
      - detect_goodhart: fires warning when efficiency up + quality down (>2% delta)
      - detect_goodhart: no warning when both improve together
    acceptance_criteria:
      - "MetricsCollector.collect() returns MetricsSnapshot for normal mission"
      - "Zero-division: 0 tasks, 0 completed, no reviews all return 0.0"
      - "Token fallback: all task.tokens_out==0 uses state.tokens_out, adds warning"
      - "avg_review_score excludes tasks with review_score==0 or status PENDING/IN_PROGRESS"
      - "quality_score = ((avg_review_score/10)*0.4 + first_pass_rate*0.3 + (1-escalation)*0.3) * 10"
      - "efficiency_gated is None when quality_score < 7.0"
      - "detect_goodhart fires when efficiency improves but quality drops by > 2%"
      - "detect_goodhart does NOT fire when both efficiency and quality improve"
    dependencies:
      - "01"
    tdd:
      test_file: "tests/review/test_collector.py"
      test_command: "pytest tests/review/test_collector.py -v --tb=short"
      tests_must_pass: true
      coverage_threshold: 90
    output_artifacts:
      - "agentforce/review/collector.py"
      - "tests/review/test_collector.py"

  - id: "03"
    title: "Persona prompt templates and JSON response parser"
    description: |
      In /Users/rent/Projects/agentforce, create agentforce/review/personas.py.

      from agentforce.core.state import MissionState
      from agentforce.review.models import MetricsSnapshot, RetroItem

      PERSONA_CONFIGS: dict[str, dict] = {
          "quality_champion": {
              "category": "went_well",
              "display_name": "Quality Champion",
              "system_prompt": """You are the Quality Champion in an AgentForce mission retrospective.
      Your role is to identify what went WELL. Focus on:
      - Tasks that passed review on the first attempt (0 retries, high score)
      - Patterns in acceptance criteria that were well-specified
      - Memory context or agent instructions that helped workers succeed
      - High review scores (>= 8/10) — what made the reviewer approve?
      - TDD patterns that caught issues early

      Analyze the mission data below. Produce 3-5 specific insights grounded in the data.
      For each, cite the specific task ID, metric value, or event log entry as evidence.
      Do NOT produce generic advice. Every insight must reference actual numbers or events.

      RESPOND WITH VALID JSON ONLY — no prose before or after:
      {"insights": [{"insight": "...", "supporting_evidence": ["task_id:01 score=9 retries=0", "..."], "confidence": 0.9}]}""",
          },
          "devils_advocate": {
              "category": "not_well",
              "display_name": "Devil's Advocate",
              "system_prompt": """You are the Devil's Advocate in an AgentForce mission retrospective.
      Your role is to identify what did NOT go well. Focus on:
      - Tasks that required retries: what caused the worker to fail?
      - Low review scores (< 7): what patterns in review feedback indicate?
      - Human escalations: what did the agent fail to handle autonomously?
      - Caps that were hit: what resource constraints caused problems?
      - Blocking issues in review_feedback: recurring patterns?

      Analyze the mission data below. Produce 3-5 specific insights grounded in the data.
      For each, cite the specific task ID, metric value, or event log entry as evidence.
      Do NOT produce generic advice. Every insight must reference actual numbers or events.

      RESPOND WITH VALID JSON ONLY — no prose before or after:
      {"insights": [{"insight": "...", "supporting_evidence": ["task_id:02 retries=3", "..."], "confidence": 0.85}]}""",
          },
          "innovation_scout": {
              "category": "should_try",
              "display_name": "Innovation Scout",
              "system_prompt": """You are the Innovation Scout in an AgentForce mission retrospective.
      Your role is to propose actionable experiments. Focus on:
      - Cap adjustments: would higher/lower retry limits, wall time, or concurrency help?
      - Task granularity: should large tasks be split to reduce rework?
      - Acceptance criteria improvements: what made criteria hard to verify?
      - Memory entries: what lessons should be stored to prevent repeated mistakes?
      - Model selection: are expensive models used where cheaper ones would suffice?

      Analyze the mission data below. Produce 3-5 specific, testable proposals.
      Each must be actionable and reference data from this mission (not generic advice).

      RESPOND WITH VALID JSON ONLY — no prose before or after:
      {"insights": [{"insight": "proposal", "supporting_evidence": ["rework_rate=0.6", "..."], "confidence": 0.7}]}""",
          },
          "philosopher": {
              "category": "puzzles_us",
              "display_name": "Philosopher",
              "system_prompt": """You are the Philosopher in an AgentForce mission retrospective.
      Your role is to surface anomalies, paradoxes, and unexplained patterns. Focus on:
      - Tasks with high review scores but many retries (or vice versa): why?
      - Metrics that contradict each other (e.g., low cost but high wall time)
      - Human escalations that seem avoidable in retrospect
      - Event log sequences that suggest systemic issues (e.g., always failing on task N)
      - Correlations between token usage and quality that defy expectations

      Analyze the mission data below. Produce 2-4 thought-provoking puzzles.
      Frame each as a question or anomaly worth investigating further.

      RESPOND WITH VALID JSON ONLY — no prose before or after:
      {"insights": [{"insight": "puzzle or anomaly", "supporting_evidence": ["..."], "confidence": 0.6}]}""",
          },
      }

      def build_persona_prompt(
          persona_key: str,
          metrics: MetricsSnapshot,
          state: MissionState,
          prior_history: list[str] | None = None,
      ) -> tuple[str, str]:
          """Build (system_prompt, user_message) for a persona.

          user_message must include:
          1. Mission context: name, goal (first 200 chars), completed_at
          2. Metrics table: all 8 metrics, quality_score, efficiency_gated status
             If metrics has a baseline (non-zero baseline fields), show delta: "0.4 (↓0.1 vs baseline)"
          3. Per-task breakdown table:
             task_id | title (truncated 40 chars) | status | retries | score | cost_usd | tokens_out
          4. Last 50 event_log entries: "timestamp | event_type | task_id | details"
          5. Caps hit (if any): "caps_hit: {cap}: {description}"
          6. Prior history (only if prior_history is not None and not empty):
             "Prior 3 action items from last review: [item1, item2, item3]"
          """

      def parse_persona_response(raw: str, persona_key: str) -> list[RetroItem]:
          """Parse Claude's JSON response into list[RetroItem].

          Use backward-scanning JSON parser (same approach as autonomous._parse_reviewer_output()):
          - Scan from end of raw string to find last '}', then find matching '{'
          - Try json.loads() on that substring
          - Validate it has "insights" key with list value
          - Map each insight to RetroItem(persona=persona_key, category=PERSONA_CONFIGS[...]["category"], ...)

          On any failure: return [RetroItem(
              persona=persona_key,
              category=PERSONA_CONFIGS[persona_key]["category"],
              insight=raw[:500],
              confidence=0.3
          )]
          """

