      - "MetricsSnapshot.quality_score formula: ((avg_review_score/10)*0.4 + first_pass_rate*0.3 + (1-human_escalation_rate)*0.3) * 10"
      - "Caps dataclass has review: str = 'enabled' field serialized in to_dict/from_dict"
