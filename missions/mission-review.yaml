  - id: "04"
    title: "Review orchestrator with model resolution and resilience"
    description: |
      In /Users/rent/Projects/agentforce, create agentforce/review/reviewer.py.

      from anthropic import Anthropic
      from agentforce.core.state import MissionState
      from agentforce.memory.memory import Memory
      from agentforce.review.collector import MetricsCollector
      from agentforce.review.models import (
          ReviewReport, RetroItem, ActionItem, MetricsSnapshot, GoodhartWarning
      )
      from agentforce.review.personas import PERSONA_CONFIGS, build_persona_prompt, parse_persona_response

      AGENTFORCE_HOME = Path(os.path.expanduser("~/.agentforce"))

      def _resolve_model(requested_model: str | None) -> str:
          """Resolve the model to use for review.
          Order: requested_model > connectors config > fallback 'claude-sonnet-4-5'

          Check connectors by reading ~/.agentforce/connectors.json for active LLM connectors.
          Currently only "anthropic" connector provides a model. Read its configured model if set,
          otherwise return "claude-sonnet-4-5".
          """

      def _get_anthropic_client() -> Anthropic:
          """Get Anthropic client. Uses ANTHROPIC_API_KEY env var (set by connector config)."""
          return Anthropic()

      class MissionReviewer:

          def __init__(
              self,
              memory: Memory,
              state_dir: Path | None = None,
              review_dir: Path | None = None,
          ):
              self.memory = memory
              self.state_dir = state_dir or (AGENTFORCE_HOME / "state")
              self.review_dir = review_dir or (AGENTFORCE_HOME / "reviews")

          def review(self, mission_id: str, model: str | None = None) -> ReviewReport:
              """Run a full review for a mission.

              Steps:
              1. Load MissionState from state_dir/{mission_id}.json
              2. MetricsCollector.collect(state) → MetricsSnapshot
              3. Load baseline: _load_baseline(mission_id) → MetricsSnapshot | None
              4. detect_goodhart(current, baseline) if baseline exists
              5. Load prior history: last 3 action item summaries from memory
                 memory.project_get(mission_id, "review:actions:last3") → parse JSON list
              6. resolved_model = _resolve_model(model)
              7. client = _get_anthropic_client()
              8. total_cost = 0.0
              For each persona in ["quality_champion", "devils_advocate",
                                    "innovation_scout", "philosopher"]:
                  a. system, user = build_persona_prompt(key, metrics, state, prior_history)
                  b. try:
                       response = client.messages.create(
                           model=resolved_model,
                           max_tokens=2000,
                           system=system,
                           messages=[{"role": "user", "content": user}],
                           timeout=60.0
                       )
                       raw = response.content[0].text
                       if hasattr(response, "usage"):
                           # Approximate cost: input*0.000003 + output*0.000015 for Sonnet
                           total_cost += (response.usage.input_tokens * 3 +
                                          response.usage.output_tokens * 15) / 1_000_000
                     except Exception as e:
                       raw = ""  # graceful degradation — empty retro items for this persona
                  c. raw_outputs[persona_key] = raw
                  d. items = parse_persona_response(raw, persona_key)
                  e. all_retro_items.extend(items)
              9. action_items = _synthesize_actions(all_retro_items, metrics, client, resolved_model)
              10. total_cost += synthesis_cost
              11. Assemble ReviewReport
              12. review_dir.mkdir(parents=True, exist_ok=True)
                  report.save(review_dir / f"{mission_id}_review.json")
              13. _save_baseline(mission_id, metrics)
              14. _update_action_history(mission_id, action_items[:3])
              15. Return report
              """

          def _synthesize_actions(
              self,
              retro_items: list[RetroItem],
              metrics: MetricsSnapshot,
              client: Anthropic,
              model: str,
          ) -> tuple[list[ActionItem], float]:
              """5th LLM call: synthesize action items from all persona insights.

              Prompt asks Claude for JSON:
              {"action_items": [{
                "action_type": "roadmap_feature|memory_entry|process_improvement",
                "title": "...",
                "description": "...",
                "priority": "high|medium|low",
                "source_personas": ["quality_champion"],
                "source_insights": ["insight text"],
                "memory_scope": "global|project",  // for memory_entry only
                "memory_key": "review:{mission_id}:{short_desc}",  // for memory_entry
                "memory_value": "...",               // for memory_entry
                "memory_category": "lesson|convention"  // for memory_entry
              }]}

              NOTE in prompt: "roadmap_feature items must NOT be auto-executed.
              The YAML must be reviewed and approved by a human before running."

              Returns (action_items, cost_usd). On failure returns ([], 0.0).
              Use same 60s timeout and graceful degradation pattern.
              """

          def _load_baseline(self, mission_id: str) -> MetricsSnapshot | None:
              """Load most recent metrics baseline from memory.
              Keys follow pattern review:metrics:{iso_date}.
              Find all project keys with this prefix, sort descending, return latest."""

          def _save_baseline(self, mission_id: str, metrics: MetricsSnapshot) -> None:
              """Store metrics as versioned baseline.
              Key: review:metrics:{metrics.computed_at}
              Also prune: keep only last 5 keys matching review:metrics:* prefix."""

          def _update_action_history(self, mission_id: str, items: list[ActionItem]) -> None:
              """Store last 3 action item titles+types for injection into next review.
              Key: review:actions:last3
              Value: JSON list of "{priority} [{type}] {title}" strings."""

          def _load_state(self, mission_id: str) -> MissionState:
              """Load MissionState from JSON. Raise FileNotFoundError if missing."""

      Write tests/review/test_reviewer.py with a MockAnthropicClient that:
      - Accepts model, max_tokens, system, messages, timeout params
      - Returns a mock response with .content[0].text set to valid persona JSON
      - Has .usage with input_tokens=1000, output_tokens=500
