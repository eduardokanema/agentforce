    acceptance_criteria:
      - "mission review <id> --skip writes sentinel file and exits cleanly"
      - "mission review <id> prints all metric sections to stdout"
      - "mission review <id> --approve calls write_approved_items and prints count"
      - "GET /api/mission/{id}/review returns 404 when no review file"
      - "GET /api/mission/{id}/review returns JSON when file exists"
      - "POST /api/mission/{id}/review returns 429 when reviewed < 5 min ago"
      - "POST /api/mission/{id}/review returns 404 for unknown mission"
      - "POST /api/mission/{id}/review {"skip": true} writes sentinel file"
    dependencies:
