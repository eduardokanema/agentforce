           1x human_intervention

         TEST: verify MetricsCollector.collect():
           - tasks_completed == 3
           - tasks_total == 4
           - first_pass_rate == 0.5  (tasks 01 and 04 approved with 0 retries / 4 total)
           - rework_rate == 5/4 == 1.25
