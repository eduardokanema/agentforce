           Set all task.tokens_out = 0, set state.tokens_out = 20000
           metrics = MetricsCollector.collect(state)
           assert "per-task token fields are zero" in " ".join(metrics.data_quality_warnings)
           assert metrics.token_efficiency == 20000/3  # mission-level fallback

