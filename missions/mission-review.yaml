             category: str                   # "went_well", "not_well", "should_try", "puzzles_us"
             insight: str = ""
             supporting_evidence: list[str] = field(default_factory=list)
             confidence: float = 0.5

             def to_dict(self) -> dict: ...
             @classmethod
             def from_dict(cls, d: dict) -> RetroItem: ...

         @dataclass
         class ActionItem:
             id: str
             action_type: str  # "roadmap_feature" (⚠ never auto-execute), "memory_entry", "process_improvement"
             title: str = ""
             description: str = ""
             priority: str = "medium"  # "high", "medium", "low"
             source_personas: list[str] = field(default_factory=list)
             source_insights: list[str] = field(default_factory=list)
             approved: bool = False
             # For memory_entry type only:
             memory_scope: str = ""        # "global" or "project"
             memory_key: str = ""
             memory_value: str = ""
             memory_category: str = ""    # "lesson" or "convention"

             def to_dict(self) -> dict: ...
             @classmethod
             def from_dict(cls, d: dict) -> ActionItem: ...

         @dataclass
         class ReviewReport:
             mission_id: str
             mission_name: str = ""
             generated_at: str = field(default_factory=lambda: datetime.now(timezone.utc).isoformat())
             metrics: Optional[MetricsSnapshot] = None
             goodhart_warnings: list[GoodhartWarning] = field(default_factory=list)
             retro_items: list[RetroItem] = field(default_factory=list)
             action_items: list[ActionItem] = field(default_factory=list)
             raw_persona_outputs: dict[str, str] = field(default_factory=dict)
             review_cost_usd: float = 0.0
             skipped: bool = False

             def to_dict(self) -> dict: ...
             @classmethod
             def from_dict(cls, d: dict) -> ReviewReport: ...
             def save(self, path: Path | str) -> None:
                 # create parent dirs, write JSON
             @classmethod
             def load(cls, path: Path | str) -> ReviewReport: ...

      3. Update agentforce/core/spec.py — add to Caps dataclass:
           review: str = "enabled"  # "enabled" or "disabled"
