  - id: "05"
    title: "Memory writer with versioned baselines and approval flow"
    description: |
      In /Users/rent/Projects/agentforce, create agentforce/review/memory_writer.py.

      from agentforce.memory.memory import Memory
      from agentforce.review.models import ReviewReport, ActionItem

      class ReviewMemoryWriter:
          """Persist approved action items into the Memory system."""

          def __init__(self, memory: Memory):
              self.memory = memory

          def write_approved_items(self, report: ReviewReport) -> int:
              """Write all ActionItems where approved==True to memory.
              Returns count of items written.

              For action_type == "memory_entry":
                if memory_scope == "global":
                  memory.global_set(item.memory_key, item.memory_value, item.memory_category)
                elif memory_scope == "project":
                  memory.project_set(report.mission_id, item.memory_key,
                                      item.memory_value, item.memory_category)

              For action_type == "process_improvement":
                key = f"process:{report.mission_id}:{item.id}"
                memory.global_set(key, item.description, category="convention")

              For action_type == "roadmap_feature":
                key = f"roadmap:{report.mission_id}:{item.id}"
                memory.project_set(report.mission_id, key, item.description, category="lesson")

              Skip items where approved==False.
              """

          def approve_item(self, report: ReviewReport, item_id: str) -> bool:
              """Set approved=True on the matching ActionItem. Returns True if found."""

          def approve_all(self, report: ReviewReport) -> int:
              """Set approved=True on all ActionItems. Returns count approved."""

          def prune_baselines(self, mission_id: str, keep: int = 5) -> None:
              """Remove baseline keys older than the most recent `keep` entries.
              Keys to prune: project memory keys matching "review:metrics:*" prefix.
              Use memory.project_dump(mission_id) to find all keys, sort by timestamp
              in key name (ISO format sorts lexicographically), keep last `keep`, delete rest.
              Since Memory has no delete method, overwrite old keys with empty string or
              re-implement by rewriting the JSON file directly using Memory._project_path().
              """

      Update agentforce/review/__init__.py to also export ReviewMemoryWriter.

      Tests in tests/review/test_memory_writer.py:
      - write_approved_items: unapproved items are skipped (0 written)
      - write_approved_items: memory_entry with scope=global writes to global memory
      - write_approved_items: memory_entry with scope=project writes to project memory
      - write_approved_items: process_improvement writes to global with key "process:{id}:{item_id}"
      - write_approved_items: roadmap_feature writes to project with key "roadmap:{id}:{item_id}"
      - write_approved_items: returns correct count
      - approve_item: returns True when found, False when not found
      - approve_all: returns count of all items
      - After approve_all + write_approved_items: all items are in memory
    acceptance_criteria:
      - "write_approved_items writes memory_entry items to correct global/project scope"
      - "write_approved_items writes process_improvement to global memory"
      - "write_approved_items writes roadmap_feature to project memory"
      - "Unapproved items are never written"
      - "approve_item returns True if found, False if not"
      - "approve_all returns count of all action items"
      - "agentforce/review/__init__.py exports ReviewMemoryWriter"
    dependencies:
      - "04"
    tdd:
      test_file: "tests/review/test_memory_writer.py"
      test_command: "pytest tests/review/test_memory_writer.py -v --tb=short"
      tests_must_pass: true
      coverage_threshold: 90
    output_artifacts:
      - "agentforce/review/memory_writer.py"
      - "agentforce/review/__init__.py (updated with ReviewMemoryWriter export)"
      - "tests/review/test_memory_writer.py"

  - id: "06"
    title: "CLI subcommand and API endpoints with opt-out controls"
    description: |
      In /Users/rent/Projects/agentforce:

      1. Update agentforce/cli/cli.py — add the `review` subcommand.

         Read cli.py first to understand the existing subcommand registration pattern.
         Add a new cmd_review function and register it. Follow the exact same pattern as
         existing cmd_ functions (use argparse sub.add_parser, add to cmds dict).

         def cmd_review(args):
             """Run a mission retrospective."""
             from agentforce.review.config import is_review_enabled
             if not is_review_enabled():
                 print("Mission Review is disabled globally. Enable it in ~/.agentforce/config.json")
                 return

             if args.skip:
                 # Write sentinel file ~/.agentforce/reviews/{mission_id}_skipped
                 skip_file = AGENTFORCE_HOME / "reviews" / f"{args.id}_skipped"
                 skip_file.parent.mkdir(parents=True, exist_ok=True)
                 skip_file.touch()
                 print(f"Review skipped for mission {args.id}")
                 return

             sf = _find_state(args.id)  # existing helper in cli.py
             if not sf:
                 print(f"Mission not found: {args.id}", file=sys.stderr)
                 sys.exit(1)

             memory = _memory()  # existing helper
             from agentforce.review.reviewer import MissionReviewer
             from agentforce.review.memory_writer import ReviewMemoryWriter

             reviewer = MissionReviewer(memory=memory)
             report = reviewer.review(sf.stem, model=args.model or None)

             # Print metrics summary
             m = report.metrics
             print(f"\n=== Mission Review: {report.mission_name} ===")
             print(f"Quality Score:       {m.quality_score:.1f}/10")
             print(f"First-Pass Rate:     {m.first_pass_rate:.0%}")
             print(f"Rework Rate:         {m.rework_rate:.2f}")
             print(f"Avg Review Score:    {m.avg_review_score:.1f}/10")
             print(f"Human Escalation:    {m.human_escalation_rate:.0%}")
             print(f"Wall Time/Task:      {m.wall_time_per_task_s:.0f}s")
             print(f"Cost/Task:           ${m.cost_per_task_usd:.4f}")
             print(f"Review Rejection:    {m.review_rejection_rate:.0%}")
             if m.efficiency_gated is not None:
                 print(f"Token Efficiency:    {m.efficiency_gated:.0f} tokens/task")
             else:
                 print(f"Token Efficiency:    GATED (quality < 7.0)")
             if m.data_quality_warnings:
                 print(f"\nData Quality Warnings:")
                 for w in m.data_quality_warnings:
                     print(f"  * {w}")
             if report.goodhart_warnings:
                 print(f"\n=== GOODHART WARNINGS ===")
                 for w in report.goodhart_warnings:
                     print(f"  WARNING: {w.message}")
             for persona in ["quality_champion", "devils_advocate", "innovation_scout", "philosopher"]:
                 items = [i for i in report.retro_items if i.persona == persona]
                 cfg = __import__("agentforce.review.personas", fromlist=["PERSONA_CONFIGS"]).PERSONA_CONFIGS
                 if items:
                     print(f"\n--- {cfg[persona]['display_name']} ---")
                     for item in items:
                         print(f"  [{item.confidence:.0%}] {item.insight}")
             if report.action_items:
                 print(f"\n=== Action Items ({len(report.action_items)}) ===")
                 for ai in report.action_items:
                     print(f"  [{ai.priority.upper()}] [{ai.action_type}] {ai.title}")
                     print(f"    {ai.description[:120]}")
             print(f"\nReview cost: ${report.review_cost_usd:.4f}")
             print(f"Report: ~/.agentforce/reviews/{sf.stem}_review.json")

             if args.approve:
                 writer = ReviewMemoryWriter(memory)
                 writer.approve_all(report)
                 count = writer.write_approved_items(report)
                 print(f"\nApproved and wrote {count} action items to memory.")

         Register:
           p = sub.add_parser("review", help="run mission retrospective review")
           p.add_argument("id", help="mission ID or partial name")
           p.add_argument("--model", help="model to use (default: from connectors config)")
           p.add_argument("--approve", action="store_true", help="approve and persist all action items")
           p.add_argument("--skip", action="store_true", help="skip review for this mission")
           cmds["review"] = cmd_review

      2. Update agentforce/server/handler.py — add review API routes.

         Read handler.py first to understand the existing route pattern. Add after the
         existing mission detail routes, following the exact same if/elif pattern.

         In _handle_api() (GET routes), add before the fallthrough:
           # GET /api/mission/{id}/review
           if len(parts) == 4 and parts[0] == "api" and parts[1] == "mission" and parts[3] == "review":
               mission_id = parts[2]
               review_file = AGENTFORCE_HOME / "reviews" / f"{mission_id}_review.json"
               skip_file = AGENTFORCE_HOME / "reviews" / f"{mission_id}_skipped"
               if skip_file.exists():
                   self._json({"skipped": True, "mission_id": mission_id})
                   return
               if not review_file.exists():
                   self._json({"error": "No review found. POST to /api/mission/{id}/review to generate."}, status=404)
                   return
               import json as _j
               self._json(_j.loads(review_file.read_text()))
               return

         In do_POST(), add the route dispatch:
           if len(parts) == 4 and parts[1] == "mission" and parts[3] == "review":
               self._post_mission_review(parts[2], body)
               return

         Add method:
           def _post_mission_review(self, mission_id: str, body: dict):
               from agentforce.review.config import is_review_enabled
               if not is_review_enabled():
                   self._json({"error": "Review disabled globally"}, status=403)
                   return

               # Rate limit: 429 if reviewed < 5 minutes ago
               review_file = AGENTFORCE_HOME / "reviews" / f"{mission_id}_review.json"
               if review_file.exists():
                   import time as _t
                   age_s = _t.time() - review_file.stat().st_mtime
                   if age_s < 300:
                       self._json({"error": f"Review too recent ({age_s:.0f}s ago). Wait 5 minutes."}, status=429)
                       return

               if body.get("skip"):
                   skip_file = AGENTFORCE_HOME / "reviews" / f"{mission_id}_skipped"
                   skip_file.parent.mkdir(parents=True, exist_ok=True)
                   skip_file.touch()
                   self._json({"skipped": True})
                   return

               sf = STATE_DIR / f"{mission_id}.json"
               if not sf.exists():
                   self._json({"error": f"Mission {mission_id!r} not found"}, status=404)
                   return

               from agentforce.memory.memory import Memory
               from agentforce.review.reviewer import MissionReviewer
               memory = Memory(AGENTFORCE_HOME / "memory")
               reviewer = MissionReviewer(memory=memory)
               model = body.get("model") or None
               try:
                   report = reviewer.review(mission_id, model=model)
                   self._json(report.to_dict())
               except Exception as exc:
                   self._json({"error": str(exc)}, status=500)

         NOTE: Also create agentforce/review/config.py (if not already in models.py):
           from pathlib import Path
