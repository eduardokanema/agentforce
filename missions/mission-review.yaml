mission:
  name: "Mission Review — DORA-Inspired Retrospectives"
  goal: |
    Build a post-mission retrospective system that computes DORA-inspired metrics from
    MissionState data, runs four Claude persona agents (Quality Champion, Devil's Advocate,
    Innovation Scout, Philosopher) to generate structured retrospective insights, synthesizes
    action items, and persists lessons learned into the memory system.

    Includes anti-gaming safeguards (Goodhart's Law): a composite quality score gates
    efficiency metrics so that token or cost reductions never count unless quality >= 7.0.
    A Goodhart detector warns when efficiency improves while quality drops.

    Exposed via CLI (`mission review <id> [--model MODEL] [--approve] [--skip]`) and HTTP API
    (`GET/POST /api/mission/{id}/review`). Three opt-out layers: global config, per-mission
    YAML cap, and runtime --skip flag.

    Grounded in:
    - Accelerate (Forsgren, Humble, Kim) — DORA metrics, learning culture, fast feedback
    - Goodhart's Law — "When a measure becomes a target, it ceases to be a good measure"
    - Team Topologies — cognitive load reduction, flow efficiency

  definition_of_done:
    - "agentforce/review/ package exists with __init__.py, models.py, collector.py, personas.py, reviewer.py, memory_writer.py"
    - "MetricsSnapshot dataclass has all 8 metrics, quality_score, efficiency_gated, data_quality_warnings"
    - "MetricsCollector.collect() handles zero-division, missing timestamps, zero token fields"
    - "4 persona configs defined in PERSONA_CONFIGS; build_persona_prompt() injects prior history from review 2 onward"
    - "MissionReviewer.review() resolves model from connectors; applies 60s timeout per call with graceful degradation"
    - "ReviewMemoryWriter uses versioned baseline keys review:metrics:{iso_date}, retains last 5"
    - "CLI: mission review <id> --model MODEL --approve --skip works end-to-end"
    - "API: GET /api/mission/{id}/review returns cached JSON or 404; POST triggers review or 429 if reviewed < 5min ago"
    - "Caps dataclass in agentforce/core/spec.py has review: str = 'enabled' field"
    - "Global opt-out via ~/.agentforce/config.json review_enabled: false"
    - "All new tests pass: pytest tests/review/ -v with >= 80% coverage"
    - "Full test suite passes: pytest tests/ -v with zero regressions"

  caps:
    max_concurrent_workers: 2
    max_retries_per_task: 3
    max_retries_global: 15
    max_wall_time_minutes: 120
    max_human_interventions: 3
    review: enabled

  working_dir: "/Users/rent/Projects/agentforce"

tasks:
  - id: "01"
    title: "Data models, Caps.review field, and global config opt-out"
    description: |
      In /Users/rent/Projects/agentforce:

      1. Create agentforce/review/__init__.py:
