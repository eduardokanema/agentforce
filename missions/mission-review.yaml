           - efficiency_gated == None  (quality_score < 7.0)

         TEST: Goodhart detection
           baseline = MetricsSnapshot(mission_id="base", quality_score=8.0,
                                       avg_review_score=8.5, token_efficiency=8000.0)
           current = MetricsSnapshot(mission_id="curr", quality_score=6.5,
