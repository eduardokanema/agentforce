        - Add routes: /plan → <PlanModePage />, /connectors → <ConnectorsPage />,
          /telemetry → <TelemetryPage />
        - Create stub pages for new routes (simple <div>Coming soon</div> with page-head)

      Note: site-main has max-width 960px. For sidebar expanded (w-48=192px), the content
