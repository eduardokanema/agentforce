        - Each NavLink: active state = bg-[#061a1f] border-l-2 border-cyan text-cyan
          inactive = text-dim hover:text-text hover:bg-card
        - Collapsed: show only icon centered; Expanded: icon + label
        - Bottom: WS status dot (small) + version string when expanded

      ui/src/App.tsx — update to:
