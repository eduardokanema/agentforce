      - "ui/src/components/HudBar.tsx"
      - "ui/src/components/Sidebar.tsx"
      - "ui/src/App.tsx (updated)"
      - "ui/src/pages/PlanModePage.tsx (stub)"
      - "ui/src/pages/ConnectorsPage.tsx (stub)"
      - "ui/src/pages/TelemetryPage.tsx (stub)"

  - id: "06"
