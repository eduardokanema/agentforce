  - id: "08"
    title: "ANSI parser, stream line parser, Markdown renderer"
    description: |
      Create ui/src/lib/ansi.ts:
        export type AnsiSpan = { text: string; style: React.CSSProperties }
        export function parseAnsi(line: string): AnsiSpan[]
          - Strip and parse ANSI escape sequences: \x1b[Xm codes
          - Handle: 0 (reset), 1 (bold), 30-37 (fg colors), 90-97 (bright fg)
          - Color map: 31/91→'#ff6b6b', 32/92→'#2ecc8a', 33/93→'#f0b429',
                       34/94→'#4d94ff', 35/95→'#9b7dff', 36/96→'#22d3ee', 37/97→'#dde6f0'
          - If no ANSI codes: return [{text: line, style: {}}]
          - Properly handle multi-code sequences like \x1b[1;32m

      Create ui/src/lib/streamParser.ts:
        export type LineType = 'command'|'pass'|'fail'|'warn'|'inject'|'path'|'default'
        export function parseStreamLine(line: string): { type: LineType; raw: string }
          - 'inject': line starts with '[USER INSTRUCTION]'
          - 'command': line starts with '$ ' or '❯ ' or '> '
          - 'pass': line contains /PASS(ED)?|✓|✔/i or ends with ' ok'
          - 'fail': line contains /FAIL(ED)?|ERROR|✗|✘/i
          - 'warn': line contains /WARN(ING)?|⚠/i
          - 'path': line contains a path-like pattern /\/[a-zA-Z0-9_./-]+\.[a-z]{1,5}/
          - else: 'default'
        export const LINE_CLASSES: Record<LineType, string>
          'inject': 'bg-amber/10 border-l-2 border-amber text-amber'
          'command': 'text-cyan opacity-90'
          'pass': 'text-green'
          'fail': 'text-red'
          'warn': 'text-amber'
          'path': 'text-dim'
          'default': ''

      Create ui/src/lib/markdown.ts:
        import { marked } from 'marked'
        import DOMPurify from 'dompurify'
        marked.setOptions({ gfm: true, breaks: true })
        export function renderMarkdown(md: string): string {
          const raw = marked.parse(md) as string
          return DOMPurify.sanitize(raw, { USE_PROFILES: { html: true } })
        }

      Add unit tests in ui/src/lib/ansi.test.ts and ui/src/lib/streamParser.test.ts using vitest.
    acceptance_criteria:
      - "parseAnsi('\\x1b[32mhello\\x1b[0m') returns [{text:'hello',style:{color:'#2ecc8a'}}]"
      - "parseAnsi('plain') returns [{text:'plain',style:{}}]"
      - "parseStreamLine('$ npm test') returns {type:'command'}"
      - "parseStreamLine('[USER INSTRUCTION] do this') returns {type:'inject'}"
      - "parseStreamLine('PASSED 5 tests') returns {type:'pass'}"
      - "renderMarkdown('# Hello') contains '<h1'"
      - "renderMarkdown('<script>alert(1)</script>') does NOT contain '<script'"
      - "npm run test passes (vitest)"
    tdd:
      test_file: "ui/src/lib/ansi.test.ts"
      test_command: "cd ui && npm run test"
      tests_must_pass: true
    dependencies:
      - "04"
    output_artifacts:
      - "ui/src/lib/ansi.ts"
      - "ui/src/lib/streamParser.ts"
      - "ui/src/lib/markdown.ts"
      - "ui/src/lib/ansi.test.ts"
      - "ui/src/lib/streamParser.test.ts"

  - id: "09"
    title: "Enhanced Terminal component with virtual scroll and ANSI"
    description: |
      Create ui/src/components/Terminal.tsx to REPLACE TerminalPanel.tsx.

      Props: { lines: string[], done: boolean, className?: string }

      Implementation:
        1. Virtual scrollizer via @tanstack/virtual:
           import { useVirtualizer } from '@tanstack/virtual'
           const parentRef = useRef<HTMLDivElement>(null)
           const virtualizer = useVirtualizer({
             count: filteredLines.length,
             getScrollElement: () => parentRef.current,
             estimateSize: () => 20,
             overscan: 30,
           })

        2. Filtered lines: useMemo — if searchQuery is empty, use lines; else filter by
           line.toLowerCase().includes(searchQuery.toLowerCase())

        3. Toolbar above terminal (flex items-center gap-2 mb-1 text-[11px]):
           - Search input (flex-1): placeholder "Filter output..." px-2 py-0.5 bg-surface
             border border-border rounded font-mono text-[11px] text-text
           - Auto-scroll toggle button: "↓ Auto" (active, bg-cyan/10 text-cyan) / "↑ Manual"
           - Copy button: "⎘ Copy" — onClick copies all lines.join('\n') to clipboard

        4. Terminal container (ref=parentRef):
           className: "bg-[#050810] rounded-lg border border-border font-mono text-[12px]
                       leading-5 overflow-auto" style={{ height: '480px' }}

        5. Virtual list inner div: style={{ height: virtualizer.getTotalSize(), position:'relative' }}
           Each virtual item:
             const line = filteredLines[item.index]
             const { type } = parseStreamLine(line)
             const spans = parseAnsi(line)
             <div style={{ position:'absolute', top:item.start, left:0, right:0 }}
                  className={`px-3 ${LINE_CLASSES[type]}`}>
               {type==='inject' && <span className="text-[10px] font-bold mr-2 text-amber bg-amber/20 rounded px-1">[USER]</span>}
               {spans.map((s, i) => <span key={i} style={s.style}>{s.text}</span>)}
             </div>

        6. Auto-scroll: useEffect on lines.length — if autoScroll, parentRef.current?.scrollTo(0, totalSize)

        7. Active cursor: when !done, append a blinking _ to last line display
           (add class animate-[data-blink_1s_step-end_infinite] to a <span>_</span> after last line)

        8. When search query is active and no lines match, show "No matches for '{query}'"

      After Terminal.tsx is working:
        - Delete ui/src/components/TerminalPanel.tsx
        - Update ui/src/pages/TaskDetailPage.tsx to import Terminal instead of TerminalPanel
          (same props interface: lines + done)
    acceptance_criteria:
      - "Terminal renders 10,000 lines without browser freeze (only ~24 DOM rows visible)"
      - "ANSI escape codes render as colored spans, not raw escape characters"
      - "Search input filters displayed lines"
      - "Auto-scroll toggle changes scroll behavior"
      - "Copy button copies all lines text to clipboard"
      - "[USER INSTRUCTION] lines render with amber [USER] badge"
      - "npm run build passes"
