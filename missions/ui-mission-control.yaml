          When connecting/closed → bg-amber (no animation)
          Uses wsClient.onConnectionState() same pattern as ConnectionBanner
          + <LiveClock />

      ui/src/components/Sidebar.tsx:
        - Fixed left sidebar with collapse toggle stored in localStorage('sidebar-collapsed')
        - Collapsed: w-14, Expanded: w-48; transition-all duration-200
        - Toggle button at top: chevron icon (← / →) as text or SVG
        - Nav items array: [{label:'Mission Control', icon:'⌘', to:'/'}, {label:'Plan Mode', icon:'◈', to:'/plan'},
