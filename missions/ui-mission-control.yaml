      - "MissionCard hover shows glow shadow and action buttons"
      - "Stop/Restart buttons show confirm dialog before calling API"
      - "Metrics strip shows correct aggregated counts and cost"
      - "Empty state renders with link to /plan when no missions"
      - "npm run build passes"
    dependencies:
      - "05"
      - "03"
    output_artifacts:
