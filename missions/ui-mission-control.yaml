mission:
  name: "AgentForce UI — Space Mission Control Redesign"
  goal: |
    Transform the AgentForce UI from a minimal dashboard into a space mission control center.
    The backend already exists (handler.py + ws.py using Python stdlib http.server) with 3 GET
    API endpoints, WebSocket, SSE streaming, and SPA serving. The React UI is functional with
    all base components and pages. This mission extends both with: rich design system (Space
    Grotesk, JetBrains Mono, cyan HUD aesthetic), Plan Mode (prompt→YAML via Claude API),
    per-task model selection, stop/restart/inject controls, real-time token/cost tracking,
    retry visualization, Connectors secret management (keyring), and a Telemetry dashboard.
  definition_of_done:
    - "handler.py has do_POST and handles all new endpoints (stop/restart/inject/resolve/plan/missions/connectors/telemetry)"
    - "GET /api/models returns list with at least claude-sonnet-4-5"
    - "POST /api/mission/:id/stop and restart work correctly"
    - "POST /api/mission/:id/task/:tid/inject writes inject file and returns 409 when not in_progress"
    - "GET /api/connectors returns active status without exposing secret values"
    - "GET /api/telemetry returns aggregate stats JSON"
    - "UI renders Space Grotesk headings and JetBrains Mono terminal"
    - "HUD background CSS grid is visible on body"
    - "Sidebar with Mission Control, Plan Mode, Connectors, Telemetry navigation"
    - "HudBar shows active missions, running tasks, total cost, WS status, live clock"
    - "Mission cards show cost, workspace path, stop/restart actions on hover"
    - "Plan Mode converts text prompt to editable mission YAML with per-task model assignment"
    - "Task Detail has ANSI terminal with virtual scroll and retry history tabs"
    - "Review Panel renders Markdown feedback with score badge"
    - "Connectors page stores tokens via keyring, never exposes raw secrets"
    - "Telemetry page shows cross-mission cost/token/retry aggregate metrics"
    - "npm run build produces ui/dist/ with zero TypeScript errors"
    - "scripts/smoke_test.sh exits 0 (all endpoints respond correctly)"
  caps:
    max_concurrent_workers: 2
    max_retries_per_task: 2
    max_retries_global: 10
    max_wall_time_minutes: 180
    max_human_interventions: 3
  working_dir: "/Users/eduardo/Projects/agentforce"

tasks:
  - id: "00"
    title: "Add backend and frontend dependencies"
    description: |
      BACKEND: Update pyproject.toml to add dependencies needed for new features.
      Add to [project] dependencies: "anthropic>=0.40", "keyring>=25.0", "cryptography>=42.0"
      Do NOT add fastapi or uvicorn — the server uses Python stdlib http.server (already working).
      Run: pip install -e ".[dev]" to verify all deps install cleanly.

      FRONTEND: Install new npm packages in ui/:
        npm install marked@^15 dompurify@^3 @fontsource/space-grotesk @fontsource/jetbrains-mono @tanstack/virtual@^3
        npm install --save-dev @types/dompurify

      Verify: cat ui/package.json shows new deps; pip show anthropic exits 0.
    acceptance_criteria:
      - "pyproject.toml has anthropic>=0.40, keyring>=25.0, cryptography>=42.0 in dependencies"
      - "pip install -e . completes without errors"
      - "ui/node_modules/@tanstack/virtual directory exists"
      - "ui/node_modules/@fontsource/space-grotesk directory exists"
      - "ui/node_modules/marked directory exists"
      - "ui/node_modules/dompurify directory exists"
    output_artifacts:
      - "pyproject.toml"

  - id: "01"
    title: "TokenLedger and token fields on state"
    description: |
      Create /Users/eduardo/Projects/agentforce/agentforce/core/token_ledger.py.
      Class TokenLedger with:
        - parse_usage_line(line: str) -> dict | None
          Parses JSON lines like: {"type":"usage","input_tokens":N,"output_tokens":N,"cost_usd":F}
          Returns None for non-usage lines or malformed JSON.
        - add(task_id: str, tokens_in: int, tokens_out: int, cost_usd: float)
          Accumulates per-task totals in a dict.
        - task_totals(task_id: str) -> dict
          Returns {"tokens_in": N, "tokens_out": N, "cost_usd": F} (zeros if unknown task).
        - mission_totals() -> dict
          Returns aggregate {"tokens_in": N, "tokens_out": N, "cost_usd": F} across all tasks.
        - reset_task(task_id: str): clears task entry.

      Update /Users/eduardo/Projects/agentforce/agentforce/core/state.py:
        - Add to TaskState dataclass: tokens_in: int = 0, tokens_out: int = 0, cost_usd: float = 0.0
        - Add to MissionState dataclass: tokens_in: int = 0, tokens_out: int = 0, cost_usd: float = 0.0
        - Ensure to_dict() and to_summary_dict() include these new fields
        - Ensure load() / from_dict() can deserialize these fields (with default 0 for backwards compat)

      Write tests in tests/test_token_ledger.py.
    acceptance_criteria:
      - "TokenLedger.parse_usage_line correctly extracts tokens from usage JSON lines"
      - "TokenLedger.parse_usage_line returns None for non-usage lines"
      - "TokenLedger.mission_totals sums across all tasks correctly"
      - "TaskState and MissionState serialize/deserialize tokens_in, tokens_out, cost_usd"
      - "Existing MissionState.load() on old JSON files without token fields uses defaults of 0"
      - "pytest tests/test_token_ledger.py -v passes"
    tdd:
      test_file: "tests/test_token_ledger.py"
      test_command: "pytest tests/test_token_ledger.py -v"
      tests_must_pass: true
    dependencies:
      - "00"
    output_artifacts:
      - "agentforce/core/token_ledger.py"
      - "agentforce/core/state.py (updated)"
      - "tests/test_token_ledger.py"

  - id: "02"
    title: "Inject prompt queue in autonomous.py"
    description: |
      Update /Users/eduardo/Projects/agentforce/agentforce/autonomous.py to support
      mid-execution prompt injection via file queue.

      Add helper function:
        def check_inject_queue(mission_id: str, task_id: str) -> str | None:
          path = Path(f"~/.agentforce/state/{mission_id}/{task_id}.inject").expanduser()
          If file exists: read JSON {"message": str, "timestamp": str}, delete file, return message.
          If file missing or malformed: return None (never raise).

      Call check_inject_queue between tool calls / delegation steps in the worker loop.
      When a message is returned, prepend it to the next agent turn as:
        "[USER INSTRUCTION] {message}"
      This must also be written to the agent's stdout stream so the SSE reader picks it up.

      Write tests in tests/test_inject_queue.py using pytest tmp_path fixture to simulate the file.
    acceptance_criteria:
      - "check_inject_queue returns None when no inject file exists"
      - "check_inject_queue returns message string and deletes the file when present"
      - "Malformed JSON in inject file returns None without exception"
      - "pytest tests/test_inject_queue.py -v passes"
    tdd:
      test_file: "tests/test_inject_queue.py"
      test_command: "pytest tests/test_inject_queue.py -v"
      tests_must_pass: true
    dependencies:
      - "00"
    output_artifacts:
      - "agentforce/autonomous.py (updated)"
      - "tests/test_inject_queue.py"

  - id: "03"
    title: "Extend handler.py with POST endpoints, new GETs, and WS cost events"
    description: |
      IMPORTANT: The backend uses Python stdlib http.server.ThreadingHTTPServer in
      agentforce/server/handler.py — NOT FastAPI. Extend the existing DashboardHandler class.
      Do NOT replace the server or switch frameworks.

      1. ADD do_POST method to DashboardHandler:
         Route dispatch based on self.path (same pattern as _handle_api):

         POST /api/missions
           Read JSON body: {"yaml": str}
           Parse YAML, create MissionState, save to STATE_DIR, start autonomous runner in background thread
           Return {"id": mission_id, "status": "started"}

         POST /api/plan
           Read JSON body: {"prompt": str, "approved_models": list[str], "workspace": str}
           Use anthropic client to generate mission YAML from prompt (streaming)
           Return as SSE (text/event-stream): each chunk as "data: {chunk}\n\n", end with "data: [DONE]\n\n"
           System prompt should instruct Claude to output valid YAML in the AgentForce mission format.

         POST /api/mission/<id>/stop
           Load mission state, set all in_progress tasks to status=blocked, save state
           Return {"stopped": true}

         POST /api/mission/<id>/restart
           Load mission state, re-queue tasks with status in {failed, blocked, review_rejected} → set to pending
           Clear their worker_output. Save state. Broadcast mission_list update.
           Return {"requeued": N}

         POST /api/mission/<id>/task/<tid>/stop
           Set task status to blocked, save state, broadcast
           Return {"stopped": true}

         POST /api/mission/<id>/task/<tid>/retry
           Set task status to pending, clear worker_output, increment retry_count, save state
           Return {"retrying": true}

         POST /api/mission/<id>/task/<tid>/inject
           If task status != in_progress: return 409 {"error": "task not in_progress"}
           Write {"message": body["message"], "timestamp": now_iso} to
             ~/.agentforce/state/<id>/<tid>.inject
           Return {"delivered": true}

         POST /api/mission/<id>/task/<tid>/resolve
           Read body: {"message": str}
           Set task status from needs_human → pending, append message to worker_output, save state
           Return {"resolved": true}

         POST /api/connectors/<name>/configure
           Read body: {"token": str}
           Store via keyring.set_password("agentforce", name, token)
           Update ~/.agentforce/connectors.json metadata: {name: {active: true, last_configured: now_iso}}
           Return {"configured": true}

         POST /api/connectors/<name>/test
           Load token from keyring, make a minimal test request for the connector type
           (For unknown connectors: just check token is non-empty)
           Return {"ok": true} or {"ok": false, "error": str}

      2. ADD new GET routes to _handle_api:

         GET /api/models
           Return hardcoded list:
           [
             {"id": "claude-opus-4-5", "name": "Claude Opus 4.5", "provider": "Anthropic",
              "cost_per_1k_input": 0.015, "cost_per_1k_output": 0.075, "latency_label": "Powerful"},
             {"id": "claude-sonnet-4-5", "name": "Claude Sonnet 4.5", "provider": "Anthropic",
              "cost_per_1k_input": 0.003, "cost_per_1k_output": 0.015, "latency_label": "Standard"},
             {"id": "claude-haiku-4-5", "name": "Claude Haiku 4.5", "provider": "Anthropic",
              "cost_per_1k_input": 0.00025, "cost_per_1k_output": 0.00125, "latency_label": "Fast"}
           ]

         GET /api/mission/<id>/task/<tid>/attempts
           Load mission state, return list of attempt records from task_state.
           If task_state has no attempt history field, return [{attempt: 1, output: worker_output}].
           Return: [{"attempt_number": N, "output": str, "review": str|null, "score": int|null}]

         GET /api/connectors
           Load ~/.agentforce/connectors.json (create if missing, default {})
           For each known connector name, check keyring.get_password("agentforce", name) is not None
           Return: [{"name": str, "display_name": str, "active": bool, "last_configured": str|null}]
           Known connector names: github, slack, linear, sentry, notion, anthropic

         GET /api/telemetry
           Load all missions, aggregate:
           - total_missions, total_tasks, total_cost_usd, total_tokens_in, total_tokens_out
           - missions_by_cost: sorted desc by cost_usd (top 5)
           - tasks_by_cost: sorted desc by cost_usd across all missions (top 5)
           - retry_distribution: {"0": N, "1": N, "2+": N}
           Return as JSON

      3. ADD DELETE support (do_DELETE):
         DELETE /api/connectors/<name>
           keyring.delete_password("agentforce", name) (ignore if not set)
           Remove from connectors.json metadata
           Return {"deleted": true}

      4. EXTEND ws.py with new broadcast functions:
         broadcast_mission_cost_update(mission_id, tokens_in, tokens_out, cost_usd)
         broadcast_task_cost_update(mission_id, task_id, tokens_in, tokens_out, cost_usd)
         broadcast_task_attempt_start(mission_id, task_id, attempt_number)

      5. Add CORS headers to do_POST and do_DELETE (Access-Control-Allow-Origin: *)
         Add do_OPTIONS handler returning 200 with CORS headers for preflight.

      Write tests in tests/test_new_endpoints.py covering the key new routes.
    acceptance_criteria:
      - "GET /api/models returns JSON array with 3 Claude models"
      - "GET /api/connectors returns JSON array with 6 connectors"
      - "GET /api/telemetry returns JSON with total_missions key (can be 0)"
      - "POST /api/mission/:id/task/:tid/inject returns 409 when task not in_progress"
      - "POST /api/mission/:id/restart returns {requeued: N}"
      - "POST /api/connectors/github/configure stores via keyring and returns {configured: true}"
      - "DELETE /api/connectors/github returns {deleted: true}"
      - "ws.py has broadcast_mission_cost_update function"
      - "pytest tests/test_new_endpoints.py -v passes"
      - "All existing tests still pass: pytest tests/test_api_routes.py tests/test_ws.py -v"
    tdd:
      test_file: "tests/test_new_endpoints.py"
      test_command: "pytest tests/test_new_endpoints.py tests/test_api_routes.py -v"
      tests_must_pass: true
    dependencies:
      - "01"
      - "02"
    output_artifacts:
      - "agentforce/server/handler.py (extended)"
      - "agentforce/server/ws.py (extended)"
      - "tests/test_new_endpoints.py"

  - id: "04"
    title: "Design system — Space Grotesk, JetBrains Mono, cyan HUD, animations"
    description: |
      Transform the UI design system. The current system uses Inter font and has basic
      color tokens in style.css @theme block. Extend and replace:

      1. ui/src/main.tsx — add font imports at top:
         import '@fontsource/space-grotesk/400.css'
         import '@fontsource/space-grotesk/600.css'
         import '@fontsource/jetbrains-mono/400.css'

      2. ui/tailwind.config.ts — extend colors object with:
         cyan: '#22d3ee'
         'cyan-bg': '#061a1f'
         'glow-cyan': 'rgba(34,211,238,0.15)'
         'glow-green': 'rgba(46,204,138,0.15)'
         (keep all existing colors: bg, surface, card, card-hover, border, border-lit, text, dim,
          muted, blue, green, amber, red, purple, teal and their -bg variants)

      3. ui/src/style.css — comprehensive overhaul:
         a) Font variables in @theme block:
            --font-sans: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif
            --font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace
         b) Update body font-family to var(--font-sans)
         c) HUD grid background on body (position: relative):
            body::before {
              content: ''; position: fixed; inset: 0; pointer-events: none; z-index: -1;
              background-image:
                repeating-linear-gradient(rgba(34,211,238,0.04) 0 1px, transparent 1px 60px),
                repeating-linear-gradient(90deg, rgba(34,211,238,0.04) 0 1px, transparent 1px 60px);
            }
            body::after {
              content: ''; position: fixed; inset: 0; pointer-events: none; z-index: -1;
              background: radial-gradient(ellipse 80% 60% at 50% 0%, transparent 40%, #090d18 100%);
            }
         d) Animation keyframes:
            @keyframes pulse-glow { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
            @keyframes scan-line { 0% { top: -4px; } 100% { top: 100%; } }
            @keyframes data-blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
         e) CSS variables: --anim-fast:150ms --anim-mid:300ms --anim-slow:600ms
         f) Typography utility classes:
            .text-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; }
            .text-hero { font-size: 32px; font-weight: 700; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
    acceptance_criteria:
      - "npm run build (cd ui && npm run build) completes without errors"
      - "Space Grotesk is referenced in main.tsx imports"
      - "tailwind.config.ts has cyan, cyan-bg, glow-cyan, glow-green entries"
      - "style.css has @keyframes pulse-glow, scan-line, data-blink defined"
      - "style.css has body::before with repeating-linear-gradient for grid"
    dependencies:
      - "00"
    output_artifacts:
      - "ui/src/main.tsx (updated)"
      - "ui/src/style.css (updated)"
      - "ui/tailwind.config.ts (updated)"

  - id: "05"
    title: "App shell — Sidebar, HudBar, LiveClock, new routes"
    description: |
      Create 3 new components and update App.tsx.

      ui/src/components/LiveClock.tsx:
        export default React.memo(function LiveClock() {
          - useState for time string (HH:MM:SS)
          - useEffect: setInterval 1000ms → update state → clear on unmount
          - Render: <span className="font-mono text-[11px] text-dim tabular-nums">{time}</span>
        })

      ui/src/components/HudBar.tsx:
        - Fixed top bar: className="fixed top-0 inset-x-0 h-10 z-30 flex items-center
          px-4 gap-6 border-b border-border bg-[#0d1525]/90 backdrop-blur-sm"
        - Left: <span className="font-bold tracking-[0.15em] text-[13px] text-cyan">AGENTFORCE</span>
