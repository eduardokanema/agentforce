        restartMission(id: string): Promise<void> — POST /api/mission/{id}/restart

      Add to ui/src/lib/types.ts (extend MissionSummary):
        tokens_in?: number; tokens_out?: number; cost_usd?: number;
        workspace?: string; models?: string[];

      Add hook ui/src/hooks/useElapsedTime.ts:
