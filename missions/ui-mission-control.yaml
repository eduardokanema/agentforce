    acceptance_criteria:
      - "npm run build passes with no TypeScript errors"
      - "Sidebar renders with 4 nav items"
      - "Sidebar collapse/expand toggle works and persists in localStorage"
      - "HudBar renders at top with WS dot and live clock updating every second"
      - "Navigating to /plan, /connectors, /telemetry renders stub pages without crash"
      - "/mission/:id route still works"
      - "ConnectionBanner is removed from the layout"
    dependencies:
      - "04"
    output_artifacts:
