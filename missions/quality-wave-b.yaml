mission:
  name: "AgentForce Token Connectors + Config"
  goal: |
    Complete the Token Economy by implementing TokenEvent parsing for the
    OpenCode, Claude Code, and OpenRouter connectors using the TokenEvent
    interface established in Mission A (quality-wave-1-2). Add a UI config
    page and API endpoint so operators can view and update default mission
    caps (max_concurrent_workers, max_retries_per_task, max_wall_time_minutes,
    max_cost_usd) without editing YAML files. All 4 tasks are independent and
    run in parallel. No new dependencies. No behavior changes beyond what is
    listed.
  definition_of_done:
    - "OpenCode connector returns TokenEvent with non-zero tokens_in/tokens_out for any real run"
    - "Claude Code connector returns TokenEvent parsed from stream-json output"
    - "OpenRouter connector forwards TokenEvent from the opencode delegation"
    - "GET /api/config returns current default caps as JSON"
    - "POST /api/config updates default caps and persists to ~/.agentforce/config.json"
    - "UI settings page at /settings renders all cap fields and saves successfully"
    - "pytest tests/ passes with no regressions"
  caps:
    max_concurrent_workers: 4
    max_retries_per_task: 3
    max_retries_global: 12
    max_wall_time_minutes: 90
    max_cost_usd: 0
    max_human_interventions: 3
    review: enabled
  working_dir: /Users/eduardo/Projects/agentforce

tasks:
  - id: "01"
    title: "OpenCode connector — emit TokenEvent from JSON stream"
    description: |
      In agentforce/connectors/opencode.py, the run() function already parses
      the JSON event stream (event.get("type") == "text"). Extend it to also
      capture token usage events and return a TokenEvent.

      STEP 1 — Detect usage events in the stream loop:
        The opencode CLI emits JSON events of various types. Find events where:
          event.get("type") in ("usage", "tokens", "stats")
        OR any event containing keys like "inputTokens", "outputTokens",
        "promptTokens", "completionTokens", "tokensIn", "tokensOut".
        Sum across all such events for the full session.

      STEP 2 — Build TokenEvent at end of run():
        from agentforce.core.token_event import TokenEvent
        token_event = TokenEvent(
            tokens_in=total_input_tokens,
            tokens_out=total_output_tokens,
            cost_usd=0.0,  # OpenCode does not report cost directly
        )

      STEP 3 — Extend return signature from 4-tuple to 5-tuple:
        Return: (success, output, error, session_id, token_event)
        Default token_event to TokenEvent(0, 0, 0.0) if no usage events found.

      STEP 4 — Update autonomous.py caller to unpack the new 5-tuple:
        success, output, error, session_id, token_event = opencode.run(...)
        Then pass token_event to ledger.update().

      Do not modify TokenEvent dataclass. Do not change model selection logic.
      Follow the same pattern established by the updated codex.py from Mission A.
    acceptance_criteria:
      - "opencode.run() returns a 5-tuple with TokenEvent as the 5th element"
      - "TokenEvent.tokens_in and tokens_out are non-zero after a real opencode run"
      - "TokenEvent(0, 0, 0.0) returned when no usage events found in stream (graceful default)"
      - "autonomous.py unpacks the 5-tuple and passes token_event to ledger.update()"
      - "pytest tests/ -k 'opencode or token_event' passes"
    tdd:
      test_file: "tests/test_connectors.py"
      test_command: "pytest tests/test_connectors.py -v -k 'opencode'"
      tests_must_pass: true
    output_artifacts:
      - "agentforce/connectors/opencode.py"
      - "agentforce/autonomous.py"

  - id: "02"
    title: "Claude Code connector — emit TokenEvent from stream-json output"
    description: |
      In agentforce/connectors/claude.py, the run() function currently uses
      --output-format text, which discards token usage data. Switch to
      --output-format stream-json to capture structured usage.

      STEP 1 — Change output format flag:
        Before: ["claude", "--dangerously-skip-permissions", "-p", "--output-format", "text"]
        After:  ["claude", "--dangerously-skip-permissions", "-p", "--output-format", "stream-json"]

      STEP 2 — Parse stream-json events in the stdout loop:
        Each line is a JSON object. Collect:
          - Lines with "type": "text" or "type": "content_block_delta" → append text to output
          - Lines with "type": "message_delta" or "type": "message" containing
            a "usage" key → extract:
              usage.input_tokens  → tokens_in
              usage.output_tokens → tokens_out

        Also check for top-level "usage" key in any event:
          event.get("usage", {}).get("input_tokens", 0)
          event.get("usage", {}).get("output_tokens", 0)

      STEP 3 — Build TokenEvent and extend return signature to 5-tuple:
        from agentforce.core.token_event import TokenEvent
        token_event = TokenEvent(
            tokens_in=total_input_tokens,
            tokens_out=total_output_tokens,
            cost_usd=0.0,  # Claude Code CLI does not report cost_usd directly
        )
        Return: (success, output, error, None, token_event)
        Note: session_id remains None for Claude — it handles state internally.

      STEP 4 — Update autonomous.py caller to unpack the new 5-tuple for claude.

      Verify text output quality is unchanged (stream-json contains same content as text).
    acceptance_criteria:
      - "claude.run() returns a 5-tuple with TokenEvent as the 5th element"
      - "TokenEvent.tokens_in and tokens_out are non-zero after a real claude run"
      - "Text output content is equivalent to previous --output-format text behavior"
      - "session_id (4th element) remains None — Claude handles state internally"
      - "pytest tests/ -k 'claude or token_event' passes"
    tdd:
      test_file: "tests/test_connectors.py"
      test_command: "pytest tests/test_connectors.py -v -k 'claude'"
      tests_must_pass: true
    output_artifacts:
      - "agentforce/connectors/claude.py"
      - "agentforce/autonomous.py"

  - id: "03"
    title: "OpenRouter connector — forward TokenEvent through opencode delegation"
    description: |
      In agentforce/connectors/openrouter.py, the run() function is a thin
      wrapper that delegates entirely to opencode.run(). Once Task 01 extends
      opencode.run() to return a 5-tuple, openrouter.run() must forward the
      full 5-tuple including TokenEvent.

      STEP 1 — Update return type annotation:
        Before: tuple[bool, str, str, str | None]
        After:  tuple[bool, str, str, str | None, TokenEvent]

      STEP 2 — The delegation call already forwards all arguments:
        return _opencode.run(prompt, workdir, timeout, model, stream_path, variant, session_id)
        Since opencode.run() now returns 5 elements, this return statement
        automatically forwards the full 5-tuple. No logic changes needed.

      STEP 3 — Add import and type annotation only:
        from agentforce.core.token_event import TokenEvent
        Update the docstring to reflect the new return signature.

      STEP 4 — Update autonomous.py caller for openrouter to unpack 5-tuple
        (same change as Task 01 if not already unified in autonomous.py).

      Verify: openrouter routes correctly prefix "openrouter/" and token data
      flows through unchanged.
    acceptance_criteria:
      - "openrouter.run() return type annotation includes TokenEvent as 5th element"
      - "TokenEvent from opencode propagates through openrouter delegation unchanged"
      - "Model string is still prefixed with 'openrouter/' when not already present"
      - "openrouter.run() requires zero logic changes — only type annotation and import"
      - "pytest tests/ -k 'openrouter or token_event' passes"
    dependencies: []
    tdd:
      test_file: "tests/test_connectors.py"
      test_command: "pytest tests/test_connectors.py -v -k 'openrouter'"
      tests_must_pass: true
    output_artifacts:
      - "agentforce/connectors/openrouter.py"

  - id: "04"
    title: "UI config page and API endpoint for default mission caps"
    description: |
      Add a settings page to the AgentForce UI and a backing API endpoint so
      operators can view and update default mission caps without editing YAML.

      BACKEND — API endpoint in agentforce/server/handler.py (or routes/):

        Config file location: ~/.agentforce/config.json
        Default content:
          {
            "default_caps": {
              "max_concurrent_workers": 2,
              "max_retries_per_task": 2,
              "max_wall_time_minutes": 60,
              "max_cost_usd": 0
            }
          }

        GET /api/config
          → 200 { "default_caps": { ... } }
          → Creates config.json with defaults if it does not exist

        POST /api/config
          Body: { "default_caps": { "max_concurrent_workers": 4, ... } }
          Validation:
            max_concurrent_workers: integer 1–8
            max_retries_per_task: integer 1–5
            max_wall_time_minutes: integer 10–480
            max_cost_usd: float >= 0 (0 = unlimited)
          → 200 { "default_caps": { ... } } on success
          → 400 { "error": "<field> out of range" } on validation failure
          → Writes validated config atomically to config.json

      FRONTEND — Settings page in the AgentForce UI:

        Route: /settings (or accessible from the main nav)
        Components:
          - Page title: "Mission Defaults"
          - 4 labeled input fields (one per cap) with current values pre-filled
          - Input constraints matching backend validation ranges
          - "Save" button → POST /api/config → show success/error toast
          - "Reset to defaults" button → restores original default values
          - Help text under max_cost_usd: "0 = unlimited (no budget cap)"

        Use the same styling/component system as existing AgentForce UI pages.
        Do not add a new CSS framework or UI library.
    acceptance_criteria:
      - "GET /api/config returns 200 with default_caps JSON (creates file if missing)"
      - "POST /api/config with valid payload updates config.json and returns 200"
      - "POST /api/config with max_concurrent_workers=0 returns 400 with error message"
      - "UI /settings page renders 4 cap fields pre-filled with current config values"
      - "pytest tests/ -k 'config' passes"
    tdd:
      test_file: "tests/test_api_routes.py"
      test_command: "pytest tests/test_api_routes.py -v -k 'config'"
      tests_must_pass: true
    output_artifacts:
      - "agentforce/server/handler.py (or agentforce/server/routes/config.py)"
      - "~/.agentforce/config.json (created at runtime, not committed)"
      - "agentforce/static/settings.html (or equivalent UI component)"
